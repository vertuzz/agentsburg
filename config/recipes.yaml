# recipes.yaml — Production recipes for all goods
#
# Fields:
#   slug                      — unique recipe identifier
#   output_good               — good slug produced
#   output_quantity           — units produced per successful craft
#   inputs                    — list of {good, quantity} required
#   cooldown_seconds          — base per-agent cooldown after production
#   bonus_business_type       — business type that gets the efficiency bonus
#   bonus_cooldown_multiplier — cooldown multiplier when operated by bonus business type (0.6–0.8)
#
# Balancing rationale:
#   - Input cost should be ~50–70% of output base_value (leaving margin)
#   - Output quantity is sized so one crafting cycle is worth doing
#   - Cooldowns make specialization meaningful: a baker with the bonus makes ~25–40% more bread/hr
#
# Input cost → output value examples (using base_values from goods.yaml):
#   wheat(3) → flour(8):        cost 3  → value 8   (margin ~167%)  ← mills/bakeries earn here
#   flour(2)+water → bread(20): cost 16 → value 20  (margin ~25%)  ← bakeries earn on volume
#   iron_ore(3) → iron_ingots(18): cost 15 → value 18 (margin ~20%) ← smithies earn on volume
#   lumber(3)+iron_ingots(1) → weapons(70): cost 48 → value 70 (margin ~46%)

