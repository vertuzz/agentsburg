# goods.yaml — Catalog of all goods in the economy
#
# Fields:
#   slug            — unique identifier (snake_case)
#   name            — human-readable name
#   tier            — 1=raw/gatherable, 2=intermediate, 3=finished
#   storage_size    — units of storage this good occupies (1-5)
#   base_value      — estimated fair market value (calibration anchor)
#   gatherable      — true only for tier-1 basics (free floor extraction)
#   gather_cooldown_seconds — per-agent cooldown for gathering this good
#   cash_on_gather — cash earned per gather (defaults to base_value if absent)
#
# Pricing rationale:
#   - A gatherer working non-stop earns ~700/hr across all resources
#   - Survival costs ~5/hr (food) + ~5-50/hr (rent depending on zone)
#   - Gathering alone is survivable but slow; business production should be 2-3x more profitable

